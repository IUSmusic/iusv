<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IUS Visualizer • v2.0</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg: #050507;
      --panel: rgba(15,15,25,0.65);
      --panel-border: rgba(167,139,250,0.15);
      --accent: #a78bfa;
      --accent2: #38bdf8;
      --muted: rgba(255,255,255,0.6);
      --font-ui: 'DM Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: var(--font-ui);
      overflow: hidden;
    }

    body { padding: 12px; }

    .wrap {
      max-width: 1680px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 14px;
      height: calc(100vh - 24px);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 16px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .top-main {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, .file-btn, select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 11px;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover, .file-btn:hover, select:hover {
      background: rgba(167,139,250,0.15);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(167,139,250,0.3);
    }

    .file-btn input { display: none; }

    .stage-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .stage-wrap {
      flex: 1;
      background: #000;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: crisp-edges;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.6) 100%);
      mix-blend-mode: multiply;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      overflow-y: auto;
      padding-right: 6px;
      max-height: 100%;
    }

    .ctrl-section {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 0 4px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    label {
      font-size: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    label span {
      display: flex;
      justify-content: space-between;
    }

    input[type="range"] { accent-color: var(--accent); }

    input[type="color"] {
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .status {
      font-size: 10px;
      color: var(--muted);
      min-height: 18px;
    }

    .beat-flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 80ms;
      pointer-events: none;
      z-index: 9999;
    }

    .hidden-ui .top, .hidden-ui .controls {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="beat-flash" id="beatFlash"></div>

  <div class="wrap" id="mainWrap">
    <div class="top-main">
      <div class="panel">
        <div class="title">IUS Visualizer <span style="font-size:12px;opacity:0.5;">v2.0</span></div>

        <div class="toolbar">
          <label class="file-btn">🎵 Music <input id="musicInput" type="file" accept="audio/*"></label>
          <label class="file-btn">📷 Media <input id="mediaInput" type="file" accept="image/*,video/*"></label>
          <label class="file-btn">🌌 BG <input id="bgInput" type="file" accept="image/*,video/*"></label>
          <button id="micBtn">🎤 Mic</button>
          <button id="playPauseBtn">Pause</button>
          <button id="fullscreenBtn">⛶ Full</button>
          <button id="cleanBtn">🧼 Clean</button>
          <button id="randomBtn">🎲 Random</button>
          <select id="presetSelect">
            <option value="">— Presets —</option>
            <option value="neon">Neon Rush</option>
            <option value="chill">Chill Void</option>
            <option value="cyber">Cyber Pulse</option>
            <option value="festival">Festival</option>
            <option value="dream">Dream Core</option>
          </select>
        </div>

        <div class="audio-bar" style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin:8px 0">
          <input id="musicSeek" type="range" min="0" max="100" value="0">
          <div id="musicTime" style="font-size:10px;white-space:nowrap;color:var(--muted)">00:00 / 00:00</div>
        </div>

        <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
          <div style="flex:1">
            <div style="font-size:9px;color:var(--muted);margin-bottom:2px">Volume</div>
            <input id="volume" type="range" min="0" max="100" value="80">
          </div>
          <div style="flex:1">
            <div style="font-size:9px;color:var(--muted);margin-bottom:2px">Speed</div>
            <input id="timeScale" type="range" min="20" max="200" value="100">
          </div>
        </div>

        <div class="status" id="status">Ready — drop a file or click Mic</div>
      </div>

      <div class="stage-panel panel">
        <div class="stage-wrap" id="stage">
          <canvas id="c" width="960" height="540"></canvas>
          <div class="overlay"></div>
        </div>
        <div style="margin-top:8px;font-size:9px;color:var(--muted);display:flex;justify-content:space-between">
          <span>Canvas 2D • Web Audio • Standalone</span>
          <span id="fps">60 fps</span>
        </div>
      </div>
    </div>

    <div class="panel controls" id="controlsPanel">
      <div class="ctrl-section">— Style</div>
      <label><span>Visual Style <em id="vStyle">Neon</em></span>
        <select id="barType">
          <option value="dots">Classic Dots</option>
          <option value="solid">Solid Bars</option>
          <option value="neon" selected>Neon Glow</option>
          <option value="liquid">Liquid Flow</option>
          <option value="lines">Thin Lines</option>
        </select>
      </label>
      <label><span>Auto Hue <em id="vAutoHue">45</em></span>
        <input id="autoHueSpeed" type="range" min="0" max="100" value="45">
      </label>
      <label><span>Symmetry <input id="symmetry" type="checkbox" checked></span></label>

      <div class="ctrl-section">— Core</div>
      <label><span>Bars <em id="vBars">42</em></span><input id="bars" type="range" min="16" max="96" value="42"></label>
      <label><span>Glow <em id="vGlow">28</em></span><input id="glow" type="range" min="0" max="80" value="28"></label>
      <label><span>Motion <em id="vMotion">65</em></span><input id="motion" type="range" min="0" max="100" value="65"></label>
      <label><span>Wave Height <em id="vWaveHeight">48</em></span><input id="waveHeight" type="range" min="10" max="90" value="48"></label>
      <label>Wave Color <input id="waveColor" type="color" value="#c4b5fd"></label>

      <div class="ctrl-section">— Beat & Effects</div>
      <label><span>Beat Sens <em id="vBeat">78</em></span><input id="beatSensitivity" type="range" min="0" max="100" value="78"></label>
      <label><span>Bloom <em id="vBloom">55</em></span><input id="bloom" type="range" min="0" max="100" value="55"></label>
      <label><span>Vignette <em id="vVignette">35</em></span><input id="vignette" type="range" min="0" max="80" value="35"></label>

      <div class="ctrl-section">— Dust & Particles</div>
      <label><span>Amount <em id="vDust">42</em></span><input id="dustAmount" type="range" min="0" max="120" value="42"></label>
      <label><span>Speed <em id="vDustSpeed">38</em></span><input id="dustSpeed" type="range" min="0" max="100" value="38"></label>

      <div class="ctrl-section">— Layers</div>
      <label><span>Viz Scale <em id="vVizScale">100</em></span><input id="vizScale" type="range" min="40" max="160" value="100"></label>
      <label><span>Media Opacity <em id="vMediaOpacity">85</em></span><input id="mediaOpacity" type="range" min="0" max="100" value="85"></label>
      <label><span>BG Opacity <em id="vBgOpacity">65</em></span><input id="bgOpacity" type="range" min="0" max="100" value="65"></label>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: true });

    const el = {};
    [
      'bars','glow','motion','waveHeight','waveColor','barType','autoHueSpeed','symmetry',
      'beatSensitivity','bloom','vignette','dustAmount','dustSpeed','vizScale',
      'mediaOpacity','bgOpacity','musicInput','mediaInput','bgInput','musicSeek','musicTime',
      'playPauseBtn','fullscreenBtn','cleanBtn','randomBtn','presetSelect','micBtn','volume','timeScale',
      'status','beatFlash','fps'
    ].forEach(id => el[id] = document.getElementById(id));

    let t = 0;
    let lastTime = 0;
    let running = true;
    let raf = 0;
    let audioLayer = null;
    let mediaLayer = null;
    let bgLayer = null;
    let audioCtx;
    let analyser;
    let source;
    let gainNode;
    let micStream = null;
    let particles = [];
    let hueOffset = 0;
    let isClean = false;

    const presets = {
      neon: { bars: 48, glow: 45, motion: 72, waveHeight: 52, autoHueSpeed: 60, beatSensitivity: 85, bloom: 70, vignette: 25, dustAmount: 55, dustSpeed: 45, vizScale: 105, barType: "neon" },
      chill: { bars: 32, glow: 15, motion: 40, waveHeight: 35, autoHueSpeed: 12, beatSensitivity: 55, bloom: 30, vignette: 50, dustAmount: 25, dustSpeed: 20, vizScale: 90, barType: "liquid" },
      cyber: { bars: 64, glow: 60, motion: 85, waveHeight: 65, autoHueSpeed: 80, beatSensitivity: 90, bloom: 80, vignette: 15, dustAmount: 80, dustSpeed: 70, vizScale: 110, barType: "lines" },
      festival: { bars: 52, glow: 70, motion: 95, waveHeight: 78, autoHueSpeed: 95, beatSensitivity: 92, bloom: 90, vignette: 10, dustAmount: 95, dustSpeed: 85, vizScale: 120, barType: "neon" },
      dream: { bars: 28, glow: 22, motion: 35, waveHeight: 42, autoHueSpeed: 8, beatSensitivity: 45, bloom: 40, vignette: 65, dustAmount: 18, dustSpeed: 15, vizScale: 85, barType: "liquid" }
    };

    function applyPreset(name) {
      const p = presets[name];
      if (!p) return;
      Object.keys(p).forEach(k => {
        const input = document.getElementById(k);
        if (input) {
          if (input.type === 'checkbox') input.checked = !!p[k];
          else input.value = p[k];
        }
      });
      updateAllLabels();
    }

    function updateAllLabels() {
      document.querySelectorAll('em[id^="v"]').forEach(em => {
        const id = em.id.replace('v', '');
        const input = document.getElementById(id);
        if (!input) return;
        em.textContent = input.type === 'checkbox' ? (input.checked ? 'ON' : 'OFF') : input.value;
      });
    }

    document.querySelectorAll('input, select').forEach(inp => {
      inp.addEventListener('input', () => {
        const em = document.getElementById('v' + inp.id);
        if (em) em.textContent = inp.type === 'checkbox' ? (inp.checked ? 'ON' : 'OFF') : inp.value;
      });
    });

    updateAllLabels();

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      gainNode = audioCtx.createGain();
      analyser.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      gainNode.gain.value = +el.volume.value / 100;
    }

    async function loadAudio(file) {
      initAudio();
      const url = URL.createObjectURL(file);
      const audio = new Audio(url);
      audio.crossOrigin = "anonymous";
      await audio.play();
      if (source) source.disconnect();
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      audioLayer = { element: audio, url };
      el.status.textContent = `Playing ${file.name}`;
      audio.addEventListener('ended', () => running = false);
      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        el.musicSeek.value = (audio.currentTime / audio.duration) * 100;
        el.musicTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
      });
    }

    function formatTime(sec) {
      sec = Math.floor(sec || 0);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    el.micBtn.onclick = async () => {
      initAudio();
      if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
        el.micBtn.style.background = '';
        el.status.textContent = 'Mic off';
        return;
      }
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        if (source) source.disconnect();
        source = audioCtx.createMediaStreamSource(micStream);
        source.connect(analyser);
        el.micBtn.style.background = '#a78bfa';
        el.status.textContent = '🎤 Live microphone active';
      } catch (e) {
        el.status.textContent = 'Mic access denied';
      }
    };

    el.playPauseBtn.onclick = () => {
      running = !running;
      el.playPauseBtn.textContent = running ? 'Pause' : 'Play';
      if (audioLayer?.element) {
        if (running) audioLayer.element.play();
        else audioLayer.element.pause();
      }
    };

    el.fullscreenBtn.onclick = () => {
      const stage = document.getElementById('stage');
      if (stage.requestFullscreen) stage.requestFullscreen();
    };

    el.cleanBtn.onclick = () => {
      isClean = !isClean;
      document.getElementById('mainWrap').classList.toggle('hidden-ui', isClean);
      el.cleanBtn.textContent = isClean ? '✕ Show UI' : 'Clean';
    };

    el.randomBtn.onclick = () => {
      document.querySelectorAll('input[type="range"]').forEach(s => {
        const min = +s.min;
        const max = +s.max;
        s.value = Math.floor(Math.random() * (max - min + 1)) + min;
      });
      updateAllLabels();
    };

    el.presetSelect.onchange = () => {
      if (el.presetSelect.value) applyPreset(el.presetSelect.value);
    };

    ['musicInput', 'mediaInput', 'bgInput'].forEach(id => {
      const inp = el[id];
      inp.parentElement.ondrop = e => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file) return;
        if (id === 'musicInput') loadAudio(file);
        else loadAsset(file, id === 'mediaInput' ? 'media' : 'bg');
      };
      inp.parentElement.ondragover = e => e.preventDefault();
    });

    function loadAsset(file, type) {
      const url = URL.createObjectURL(file);
      if (file.type.startsWith('video/')) {
        const v = document.createElement('video');
        v.src = url;
        v.loop = true;
        v.muted = true;
        v.autoplay = true;
        v.playsInline = true;
        if (type === 'media') mediaLayer = { element: v, ready: true };
        else bgLayer = { element: v, ready: true };
      } else {
        const img = new Image();
        img.src = url;
        img.onload = () => {
          if (type === 'media') mediaLayer = { element: img, ready: true };
          else bgLayer = { element: img, ready: true };
        };
      }
    }

    let freqData = new Uint8Array(512);
    let barMemory = [];
    let energy = { bass: 0, mid: 0, high: 0 };

    function getAudioData() {
      if (!analyser) return { bars: new Array(+el.bars.value).fill(0.2), bass: 0.3 };
      analyser.getByteFrequencyData(freqData);
      const bars = [];
      const count = +el.bars.value;
      for (let i = 0; i < count; i++) {
        const start = Math.floor(Math.pow(i / count, 1.6) * freqData.length);
        const end = Math.floor(Math.pow((i + 1) / count, 1.6) * freqData.length);
        let sum = 0;
        for (let j = start; j < end; j++) sum += freqData[j];
        const val = (sum / Math.max(1, end - start) / 255) * (+el.motion.value / 100);
        barMemory[i] = barMemory[i] || 0;
        barMemory[i] += (val - barMemory[i]) * 0.22;
        bars.push(Math.max(0, Math.min(1, barMemory[i])));
      }
      energy.bass = freqData.slice(0, 30).reduce((a, b) => a + b, 0) / (30 * 255);
      return { bars, bass: energy.bass };
    }

    function drawVignette() {
      const grad = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) * 0.4,
        canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.8
      );
      grad.addColorStop(0, 'transparent');
      grad.addColorStop(1, `rgba(0,0,0,${+el.vignette.value / 100})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawScene() {
      ctx.fillStyle = '#050507';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (bgLayer && bgLayer.ready) {
        ctx.globalAlpha = +el.bgOpacity.value / 100;
        ctx.drawImage(bgLayer.element, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
      }

      const s = {
        bars: +el.bars.value,
        glow: +el.glow.value,
        motion: +el.motion.value,
        waveHeight: +el.waveHeight.value,
        waveColor: el.waveColor.value,
        barType: el.barType.value,
        autoHueSpeed: +el.autoHueSpeed.value,
        symmetry: el.symmetry.checked,
        bloom: +el.bloom.value,
        dustAmount: +el.dustAmount.value,
        dustSpeed: +el.dustSpeed.value,
        vizScale: +el.vizScale.value / 100
      };

      hueOffset += s.autoHueSpeed / 1200;

      const audio = getAudioData();
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = Math.min(canvas.width, canvas.height) * 0.32 * s.vizScale;

      if (mediaLayer && mediaLayer.ready) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.82, 0, Math.PI * 2);
        ctx.clip();
        ctx.globalAlpha = +el.mediaOpacity.value / 100;
        ctx.drawImage(mediaLayer.element, cx - radius * 0.82, cy - radius * 0.82, radius * 1.64, radius * 1.64);
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      ctx.save();
      ctx.translate(cx, cy);

      ctx.shadowBlur = s.glow * 2.5;
      ctx.shadowColor = s.waveColor;
      ctx.strokeStyle = s.waveColor;
      ctx.lineWidth = 9;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();

      ctx.shadowBlur = s.glow;
      const baseHue = parseInt(s.waveColor.slice(1, 3), 16) / 2.55 + hueOffset * 360;

      for (let i = 0; i < s.bars; i++) {
        const angle = (i / s.bars) * Math.PI * 2;
        const amp = audio.bars[i] * s.motion / 70;
        const h = amp * radius * (s.waveHeight / 100);
        const x = Math.cos(angle) * radius * 0.88;
        const y = Math.sin(angle) * radius * 0.88;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle + Math.PI / 2);

        const col = `hsl(${baseHue + i * 3}, 100%, 85%)`;

        if (s.barType === 'neon') {
          ctx.shadowBlur = s.glow * 3;
          ctx.strokeStyle = col;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(0, -h);
          ctx.lineTo(0, h);
          ctx.stroke();
        } else if (s.barType === 'liquid') {
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.ellipse(0, 0, 6, h, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (s.barType === 'lines') {
          ctx.strokeStyle = col;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(-8, -h);
          ctx.lineTo(8, h);
          ctx.stroke();
        } else {
          ctx.fillStyle = col;
          ctx.fillRect(-4, -h, 8, h * 2);
        }

        ctx.restore();
      }

      ctx.restore();

      drawVignette();

      if (s.bloom > 40) {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#fff';
        for (let i = 0; i < canvas.height; i += 4) ctx.fillRect(0, i, canvas.width, 1);
        ctx.globalAlpha = 1;
      }

      while (particles.length < s.dustAmount) {
        particles.push({
          a: Math.random() * Math.PI * 2,
          r: Math.random() * radius * 0.7,
          speed: Math.random() * 0.02 + 0.01
        });
      }

      if (particles.length > s.dustAmount) particles.length = s.dustAmount;

      ctx.shadowBlur = 8;
      ctx.shadowColor = s.waveColor;
      particles.forEach(p => {
        p.a += p.speed * (s.dustSpeed / 30);
        const px = Math.cos(p.a) * p.r;
        const py = Math.sin(p.a) * p.r * 0.6;
        ctx.fillStyle = `hsla(${baseHue},100%,95%,0.6)`;
        ctx.fillRect(cx + px - 1.5, cy + py - 1.5, 3, 3);
      });
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min((ts - lastTime) / 16, 3);
      lastTime = ts;

      t += dt * (+el.timeScale.value / 100);
      drawScene();

      if (Math.random() < 0.03) el.fps.textContent = `${(1000 / Math.max(1, ts - lastTime + 16)).toFixed(0)} fps`;

      raf = requestAnimationFrame(loop);
    }

    canvas.width = 960;
    canvas.height = 540;

    el.musicInput.onchange = e => { if (e.target.files[0]) loadAudio(e.target.files[0]); };
    el.mediaInput.onchange = e => { if (e.target.files[0]) loadAsset(e.target.files[0], 'media'); };
    el.bgInput.onchange = e => { if (e.target.files[0]) loadAsset(e.target.files[0], 'bg'); };

    el.volume.oninput = () => {
      if (gainNode) gainNode.gain.value = +el.volume.value / 100;
    };

    el.musicSeek.oninput = () => {
      if (audioLayer?.element?.duration) {
        audioLayer.element.currentTime = (el.musicSeek.value / 100) * audioLayer.element.duration;
      }
    };

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        el.playPauseBtn.click();
      }
      if (e.code === 'KeyF') el.fullscreenBtn.click();
      if (e.code === 'KeyR') el.randomBtn.click();
      if (e.code === 'KeyM') el.micBtn.click();
    });

    requestAnimationFrame(loop);
    el.status.textContent = 'Drop music file or click mic to begin';
  </script>
</body>
</html>
